name: iOS App Store Build

on:
  workflow_dispatch:  # Manual trigger from GitHub Actions tab

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.302'

      - name: Install MAUI workloads
        run: dotnet workload install maui-ios maui-android maccatalyst --skip-manifest-update

      - name: Import Distribution Certificate
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > distribution.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import distribution.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Import Provisioning Profile
        env:
          PROVISION_BASE64: ${{ secrets.IOS_PROVISION_BASE64 }}
        run: |
          echo "$PROVISION_BASE64" | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build & Publish iOS
        run: |
          dotnet publish PrayTimeApp/PrayTimeApp.csproj \
            -f net9.0-ios \
            -c Release \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:ArchiveOnBuild=true \
            -p:CodesignKey="Apple Distribution: Namig Mustafayev (SY7G499VYD)" \
            -p:CodesignProvision="Nooria App Store" \
            -p:EnableAssemblyILStripping=false

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: '**/*.ipa'

      - name: Upload to App Store Connect
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8
          xcrun altool --upload-app \
            --type ios \
            --file $(find . -name "*.ipa" | head -1) \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"
